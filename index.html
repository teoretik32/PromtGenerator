<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎴 Prompt Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0b18;--card:#141428;--card-border:#1e1e3a;--tag-bg:#1a1a34;--tag-border:#2a2a50;--accent:#ff6b9d;--accent2:#c44dff;--cyan:#00d4ff;--text:#d0d0e0;--muted:#555}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
.header{text-align:center;padding:28px 20px 18px;background:linear-gradient(180deg,#160a28 0%,var(--bg) 100%)}
.header h1{font-size:1.9em;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.header p{color:#777;font-size:.9em}

.prompt-output{position:sticky;top:0;z-index:100;background:rgba(12,12,24,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,107,157,.15);padding:14px 20px}
.prompt-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.prompt-bar-left{display:flex;align-items:center;gap:10px}
.prompt-label{font-size:.8em;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.char-count{font-size:.75em;color:var(--muted)}
.prompt-actions{display:flex;gap:6px}
.btn{padding:6px 15px;border:none;border-radius:6px;cursor:pointer;font-size:.82em;font-weight:600;transition:all .2s;font-family:inherit}
.btn-copy{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-copy:hover{transform:scale(1.04);box-shadow:0 0 18px rgba(255,107,157,.35)}
.btn-reset{background:rgba(255,255,255,.08);color:#999}
.btn-reset:hover{background:rgba(255,60,60,.15);color:#ff6b6b}
.btn-random{background:rgba(0,212,255,.12);color:var(--cyan);border:1px solid rgba(0,212,255,.25)}
.btn-random:hover{background:rgba(0,212,255,.2);box-shadow:0 0 12px rgba(0,212,255,.2)}
.prompt-text{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:11px 13px;min-height:50px;max-height:140px;overflow-y:auto;font-family:Consolas,Monaco,'Courier New',monospace;font-size:.83em;line-height:1.55;color:#c8c8d8;word-break:break-word}
.prompt-text::-webkit-scrollbar{width:5px}
.prompt-text::-webkit-scrollbar-thumb{background:rgba(255,107,157,.3);border-radius:3px}
.sep{color:var(--accent);font-weight:700}
.prompt-empty{color:var(--muted);font-style:italic;font-family:inherit}

.main{max-width:880px;margin:0 auto;padding:16px}
.section{background:var(--card);border:1px solid var(--card-border);border-radius:11px;padding:16px 16px 14px;margin-bottom:10px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.section-title{font-size:.95em;font-weight:600;color:#fff}
.section-badge{font-size:.65em;color:var(--muted);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:4px}
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{padding:6px 13px;border-radius:18px;border:1px solid var(--tag-border);background:var(--tag-bg);color:#aaa;font-size:.83em;cursor:pointer;transition:all .18s;user-select:none;white-space:nowrap}
.tag:hover{border-color:rgba(255,107,157,.35);background:rgba(255,107,157,.08);color:#ddd}
.tag.on{background:linear-gradient(135deg,rgba(255,107,157,.2),rgba(196,77,255,.18));border-color:var(--accent);color:#fff;box-shadow:0 0 10px rgba(255,107,157,.15)}

.presets-wrap{display:flex;flex-wrap:wrap;gap:7px}
.preset{padding:7px 15px;border-radius:8px;border:1px solid rgba(0,212,255,.25);background:rgba(0,212,255,.06);color:var(--cyan);font-size:.83em;cursor:pointer;transition:all .2s;font-family:inherit}
.preset:hover{background:rgba(0,212,255,.14);border-color:var(--cyan);box-shadow:0 0 14px rgba(0,212,255,.15)}

.custom-input{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 13px;color:var(--text);font-size:.88em;font-family:inherit;resize:vertical;min-height:38px}
.custom-input:focus{outline:none;border-color:rgba(255,107,157,.35)}
.custom-input::placeholder{color:var(--muted)}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:11px 22px;border-radius:8px;font-weight:600;font-size:.9em;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:600px){
.header h1{font-size:1.4em}
.main{padding:10px}
.section{padding:13px 12px 11px}
.tag{font-size:.78em;padding:5px 11px}
.prompt-output{padding:10px 14px}
.prompt-text{font-size:.78em;max-height:110px}
.prompt-bar{flex-direction:column;align-items:flex-start}
}
</style>
</head>

const state={};
S.forEach(s=>state[s.id]=new Set);

function init(){
const m=document.getElementById('main');
let h='<div class="section"><div class="section-header"><span class="section-title">⚡ Быстрые пресеты</span></div><div class="presets-wrap">';
PRESETS.forEach((p,i)=>h+=`<button class="preset" onclick="applyPreset(${i})">${p.l}</button>`);
h+='</div></div>';
S.forEach(sec=>{
h+=`<div class="section"><div class="section-header"><span class="section-title">${sec.title}</span><span class="section-badge">${sec.mode==='s'?'один':'несколько'}</span></div><div class="tags" id="tags_${sec.id}">`;
sec.tags.forEach((t,i)=>h+=`<div class="tag" id="t_${sec.id}_${i}" title="${t.p}" onclick="toggle('${sec.id}',${i})">${t.l}</div>`);
h+='</div></div>'});
h+=`<div class="section"><div class="section-header"><span class="section-title">✏️ Свой текст (на английском)</span></div><textarea class="custom-input" id="customInput" placeholder="Добавь свои детали к промпту…" oninput="build()"></textarea></div>`;
m.innerHTML=h;
}

function toggle(sid,i){
const sec=S.find(s=>s.id===sid);
if(sec.mode==='s'){
if(state[sid].has(i)){state[sid].clear()}
else{state[sid].clear();state[sid].add(i)}
sec.tags.forEach((_,j)=>{
const el=document.getElementById('t_'+sid+'_'+j);
if(el)el.classList.toggle('on',state[sid].has(j))})
}else{
if(state[sid].has(i))state[sid].delete(i);else state[sid].add(i);
document.getElementById('t_'+sid+'_'+i).classList.toggle('on',state[sid].has(i))
}
build()
}

function getP(sid){
const sec=S.find(s=>s.id===sid);
return[...state[sid]].sort((a,b)=>a-b).map(i=>sec.tags[i].p)
}

function build(){
const parts=[];
const q=[...getP('quality'),...getP('camera'),...getP('shot')];
if(q.length)parts.push(q.join(', '));
const subj=[...getP('age'),...getP('body'),...getP('hair'),...getP('makeup'),...getP('expression')];
if(subj.length)parts.push(subj.join(', '));
const cl=[...getP('clothing'),...getP('shoes'),...getP('accessories')];
if(cl.length)parts.push('wearing '+cl.join(', '));
const po=getP('pose');
if(po.length)parts.push(po.join(', '));
const env=[...getP('location'),...getP('scene'),...getP('lighting')];
if(env.length)parts.push(env.join(', '));
const custom=(document.getElementById('customInput')||{}).value||'';
if(custom.trim())parts.push(custom.trim());
let prompt=parts.join(' -- ');
const par=getP('params');
if(par.length)prompt+=' '+par.join(' ');
const el=document.getElementById('promptText');
const cc=document.getElementById('charCount');
if(prompt){
el.innerHTML=prompt.replace(/ -- /g,' <span class="sep">--</span> ');
el.dataset.raw=prompt;
cc.textContent=prompt.length+' символов'
}else{
el.innerHTML='<span class="prompt-empty">← Выбери теги ниже чтобы собрать промпт…</span>';
el.dataset.raw='';
cc.textContent=''
}
}

function applyPreset(idx){
resetAll(true);
const p=PRESETS[idx];
for(const[sid,labels]of Object.entries(p.s)){
const sec=S.find(s=>s.id===sid);
if(!sec)continue;
labels.forEach(label=>{
const ti=sec.tags.findIndex(t=>t.l===label);
if(ti!==-1){state[sid].add(ti);const el=document.getElementById('t_'+sid+'_'+ti);if(el)el.classList.add('on')}
})}
build();
toast('⚡ Пресет применён!')
}

function resetAll(silent){
S.forEach(sec=>{
state[sec.id].clear();
sec.tags.forEach((_,i)=>{const el=document.getElementById('t_'+sec.id+'_'+i);if(el)el.classList.remove('on')})
});
const ci=document.getElementById('customInput');if(ci)ci.value='';
build();
if(!silent)toast('🗑️ Всё сброшено')
}

function copyPrompt(){
const raw=(document.getElementById('promptText').dataset.raw||'').trim();
if(!raw){toast('⚠️ Промпт пустой!');return}
navigator.clipboard.writeText(raw).then(()=>toast('✅ Скопировано!')).catch(()=>{
const ta=document.createElement('textarea');ta.value=raw;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✅ Скопировано!')
})
}

function randomize(){
resetAll(true);
S.forEach(sec=>{
if(sec.id==='params')return;
const count=sec.mode==='s'?1:Math.floor(Math.random()*3)+1;
const indices=[...Array(sec.tags.length).keys()];
for(let i=indices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]]}
const pick=indices.slice(0,Math.min(count,indices.length));
pick.forEach(i=>{state[sec.id].add(i);const el=document.getElementById('t_'+sec.id+'_'+i);if(el)el.classList.add('on')});
});
['--ar 2:3 (вертикаль)','--v 6','--style raw'].forEach(l=>{
const sec=S.find(s=>s.id==='params');
const ti=sec.tags.findIndex(t=>t.l===l);
if(ti!==-1){state.params.add(ti);const el=document.getElementById('t_params_'+ti);if(el)el.classList.add('on')}
});
build();
toast('🎲 Случайный промпт!')
}

let toastTimer;
function toast(msg){
const t=document.getElementById('toast');
t.textContent=msg;t.classList.add('show');
clearTimeout(toastTimer);
toastTimer=setTimeout(()=>t.classList.remove('show'),1800)
}

init();
</script>
