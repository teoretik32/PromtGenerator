<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Constructor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>🧩 Конструктор промптов</h1>
    <p>Собирай структурированные промпты для GPT / Grok / Nano Banana Pro</p>
  </header>

  <section class="prompt-output">
    <div class="prompt-bar">
      <div>
        <div class="prompt-label">Текстовый промпт</div>
        <div id="charCount" class="char-count"></div>
      </div>
      <div class="prompt-actions">
        <button class="btn btn-random" onclick="randomize()">🎲 Рандом</button>
        <button class="btn btn-reset" onclick="resetAll()">✕ Сброс</button>
        <button class="btn btn-copy" onclick="copyPrompt()">📋 Копировать текст</button>
        <button class="btn btn-json" onclick="copyJson()">🧾 Копировать JSON</button>
      </div>
    </div>
    <div id="promptText" class="prompt-text"></div>
    <details class="json-box" open>
      <summary>JSON-структура</summary>
      <pre id="jsonOutput"></pre>
    </details>
  </section>

  <main id="main" class="main"></main>
  <div id="toast" class="toast"></div>

  <script src="prompt-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
